global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'edumanage-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:8081'   # auth-service
          - 'host.docker.internal:8082'   # user-service
          - 'host.docker.internal:8083'   # student-service
          - 'host.docker.internal:8084'   # course-service
          - 'host.docker.internal:8085'   # timetable-service
          - 'host.docker.internal:8086'   # attendance-service
          - 'host.docker.internal:8087'   # grade-service
          - 'host.docker.internal:8088'   # fee-service
          - 'host.docker.internal:8089'   # notification-service
          - 'host.docker.internal:8090'   # report-service
          - 'host.docker.internal:8080'   # api-gateway
