server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-cb
                fallbackUri: forward:/fallback

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: user-cb
                fallbackUri: forward:/fallback

        - id: student-service
          uri: lb://student-service
          predicates:
            - Path=/api/students/**
          filters:
            - name: CircuitBreaker
              args:
                name: student-cb
                fallbackUri: forward:/fallback

        - id: course-service
          uri: lb://course-service
          predicates:
            - Path=/api/courses/**
          filters:
            - name: CircuitBreaker
              args:
                name: course-cb
                fallbackUri: forward:/fallback

        - id: timetable-service
          uri: lb://timetable-service
          predicates:
            - Path=/api/timetable/**
          filters:
            - name: CircuitBreaker
              args:
                name: timetable-cb
                fallbackUri: forward:/fallback

        - id: attendance-service
          uri: lb://attendance-service
          predicates:
            - Path=/api/attendance/**
          filters:
            - name: CircuitBreaker
              args:
                name: attendance-cb
                fallbackUri: forward:/fallback

        - id: grade-service
          uri: lb://grade-service
          predicates:
            - Path=/api/grades/**
          filters:
            - name: CircuitBreaker
              args:
                name: grade-cb
                fallbackUri: forward:/fallback

        - id: fee-service
          uri: lb://fee-service
          predicates:
            - Path=/api/fees/**
          filters:
            - name: CircuitBreaker
              args:
                name: fee-cb
                fallbackUri: forward:/fallback

        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/reports/**
          filters:
            - name: CircuitBreaker
              args:
                name: report-cb
                fallbackUri: forward:/fallback

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/public.pem

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
