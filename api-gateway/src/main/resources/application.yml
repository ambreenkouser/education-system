server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-cb
                fallbackUri: forward:/fallback

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: user-cb
                fallbackUri: forward:/fallback

        - id: student-service
          uri: lb://student-service
          predicates:
            - Path=/api/students/**
          filters:
            - name: CircuitBreaker
              args:
                name: student-cb
                fallbackUri: forward:/fallback

        - id: course-service
          uri: lb://course-service
          predicates:
            - Path=/api/courses/**
          filters:
            - name: CircuitBreaker
              args:
                name: course-cb
                fallbackUri: forward:/fallback

        - id: timetable-service
          uri: lb://timetable-service
          predicates:
            - Path=/api/timetable/**
          filters:
            - name: CircuitBreaker
              args:
                name: timetable-cb
                fallbackUri: forward:/fallback

        - id: attendance-service
          uri: lb://attendance-service
          predicates:
            - Path=/api/attendance/**
          filters:
            - name: CircuitBreaker
              args:
                name: attendance-cb
                fallbackUri: forward:/fallback

        - id: grade-service
          uri: lb://grade-service
          predicates:
            - Path=/api/grades/**
          filters:
            - name: CircuitBreaker
              args:
                name: grade-cb
                fallbackUri: forward:/fallback

        - id: fee-service
          uri: lb://fee-service
          predicates:
            - Path=/api/fees/**
          filters:
            - name: CircuitBreaker
              args:
                name: fee-cb
                fallbackUri: forward:/fallback

        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/reports/**
          filters:
            - name: CircuitBreaker
              args:
                name: report-cb
                fallbackUri: forward:/fallback

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 1000ms

  # No public-key-location — gateway validates HS256 tokens using the shared secret below

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

jwt:
  secret: ${JWT_SECRET:edumanage-super-secret-jwt-key-must-be-at-least-256-bits-long-for-security}

resilience4j:
  circuitbreaker:
    configs:
      default:
        # Larger window prevents hair-trigger opens on short traffic spikes
        sliding-window-size: 100
        sliding-window-type: COUNT_BASED
        # Open only when 80% of calls fail (not 50%)
        failure-rate-threshold: 80
        # Also open when 60% of calls are slow (>2s)
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 2s
        # Recover faster: 5s open state, then probe with 10 calls
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 10
        # Need at least 20 calls before evaluating failure rate
        minimum-number-of-calls: 20
        automatic-transition-from-open-to-half-open-enabled: true
